# ============================================================
# Language Configuration — 40 Languages
# Maps each language to UD treebank ID, typology, and metadata
# ============================================================
# Treebank filenames follow UD convention:
#   <lang_code>_<treebank>-ud-train.conllu  (or test/dev)
# Set 'treebank_file' to relative path under paths.treebank_root
# ============================================================

languages:

